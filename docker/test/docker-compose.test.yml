# Lean compose file for E2E tests.
#
# Engines: Trino, StarRocks, Snowflake (fakesnow mock).
# Iceberg stack: Postgres (Lakekeeper backend), MinIO, Lakekeeper.
#
# Usage (repo root as project directory):
#   docker compose -f docker/test/docker-compose.test.yml --project-directory . up -d --wait
#   cargo test -p queryflux-e2e-tests -- --include-ignored
#   docker compose -f docker/test/docker-compose.test.yml --project-directory . down

networks:
  test_net:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Query engines
  # ---------------------------------------------------------------------------

  trino:
    image: trinodb/trino:476
    environment:
      - CATALOG_MANAGEMENT=dynamic
    # GHA runners are slow when StarRocks + Trino start together; avoid the old
    # 10s start + 2 retries window that marks Trino unhealthy before JVM is ready.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/v1/status"]
      interval: 10s
      timeout: 25s
      retries: 30
      start_period: 120s
    ports:
      - "18081:8080"
    networks:
      - test_net

  starrocks:
    image: starrocks/allin1-ubuntu:4.0.1
    ports:
      - "9030:9030"
      - "8030:8030"
    # BE uses shared memory; default 64m Docker /dev/shm often breaks or slows all-in-one on CI.
    shm_size: "2gb"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # FE HTTP can take many minutes on starved GHA runners; use 127.0.0.1 (avoid localhost → IPv6).
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8030/api/health"]
      interval: 10s
      timeout: 25s
      retries: 60
      start_period: 180s
    networks:
      - test_net

  # fakesnow: local Snowflake-compatible HTTP server (https://github.com/tekumara/fakesnow).
  # Accepts any user/password/account. Used to e2e-test the SnowflakeAdapter.
  fakesnow:
    image: python:3.12-slim
    volumes:
      - ./docker/test/fakesnow-entrypoint.sh:/entrypoint.sh:ro
      - ./docker/test/fakesnow-apply-patches.py:/fakesnow-apply-patches.py:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "18085:8085"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.create_connection(('localhost',8085),2); s.close()\""]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - test_net

  # ---------------------------------------------------------------------------
  # Iceberg catalog stack (Lakekeeper + MinIO + Postgres)
  # ---------------------------------------------------------------------------

  db:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - test_net

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=minio-root-user
      - MINIO_ROOT_PASSWORD=minio-root-password
    command: ["server", "--console-address", ":9001", "/data"]
    ports:
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 10s
      retries: 20
      start_period: 15s
    networks:
      - test_net

  createbuckets:
    image: minio/minio
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minio-root-user minio-root-password;
      /usr/bin/mc mb --ignore-existing local/warehouse;
      exit 0;
      "
    networks:
      - test_net

  migrate:
    image: quay.io/lakekeeper/catalog:latest-main
    environment:
      - LAKEKEEPER__PG_ENCRYPTION_KEY=test-key-not-secure
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@db:5432/postgres
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@db:5432/postgres
    restart: "no"
    command: ["migrate"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - test_net

  lakekeeper:
    image: quay.io/lakekeeper/catalog:latest-main
    environment:
      - LAKEKEEPER__PG_ENCRYPTION_KEY=test-key-not-secure
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://postgres:postgres@db:5432/postgres
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://postgres:postgres@db:5432/postgres
    command: ["serve"]
    ports:
      - "18181:8181"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 2s
      timeout: 10s
      retries: 30
      start_period: 10s
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    networks:
      - test_net

  bootstrap:
    image: curlimages/curl
    depends_on:
      lakekeeper:
        condition: service_healthy
    restart: "no"
    # Accept ToU — ignore HTTP errors (latest-main may auto-bootstrap or return 409).
    entrypoint: /bin/sh
    command:
      - -c
      - >
        curl -sv -X POST http://lakekeeper:8181/management/v1/bootstrap
        -H 'Content-Type: application/json'
        --data '{"accept-terms-of-use": true}';
        exit 0
    networks:
      - test_net

  initialwarehouse:
    image: curlimages/curl
    depends_on:
      lakekeeper:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    restart: "no"
    # Create warehouse — ignore 409 (already exists on retry).
    entrypoint: /bin/sh
    command:
      - -c
      - >
        curl -sv -X POST http://lakekeeper:8181/management/v1/warehouse
        -H 'Content-Type: application/json'
        --data @/config/create-warehouse.json;
        exit 0
    volumes:
      - ./docker/fixtures/create-warehouse.json:/config/create-warehouse.json
    networks:
      - test_net

  # Trino persists dynamic catalogs (CATALOG_MANAGEMENT=dynamic) for the container lifetime.
  # Iceberg tables for e2e are created by `queryflux-e2e-tests` via direct Trino HTTP.
  # Sentinel: stays running forever; only starts after all init containers finish.
  # `--wait` watches this service instead of the one-shot containers so it
  # doesn't fail when migrate/bootstrap/initialwarehouse exit.
  sentinel:
    image: alpine
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      lakekeeper:
        condition: service_healthy
      initialwarehouse:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      retries: 1
      start_period: 0s
    networks:
      - test_net
