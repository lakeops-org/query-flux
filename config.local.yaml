queryflux:
  externalAddress: http://localhost:8080
  frontends:
    trinoHttp:
      enabled: true
      port: 8080
    postgresWire:
      enabled: false
      port: 5432
    mysqlWire:
      enabled: true
      port: 3306
    # Form 1: Snowflake wire protocol (JDBC / ODBC / Python SDK)
    snowflakeHttp:
      enabled: true
      port: 8445
    # Form 2: Snowflake SQL REST API v2
    snowflakeSqlApi:
      enabled: true
      port: 8446
  persistence:
    type: postgres
    url: postgres://queryflux:queryflux@localhost:5433/queryflux
  adminApi:
    port: 9000
  configReloadIntervalSecs: 30

# Optional when persistence.type is postgres: clusters, clusterGroups, routers, and
# routingFallback can be omitted — define them in QueryFlux Studio (stored in DB).

