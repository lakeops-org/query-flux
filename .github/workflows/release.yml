name: 🚀 Release

on:
  push:
    branches:
      - main
      - "rel-*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || github.repository }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release_please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please/release-please-config.json
          manifest-file: release-please/.release-please-manifest.json

  build-slim:
    name: Build server-only image
    needs: [release_please]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-slim-main
            type=raw,value=${{ needs.release_please.outputs.tag_name }},enable=${{ needs.release_please.outputs.releases_created == 'true' }}
            type=raw,value=latest-slim,enable=${{ needs.release_please.outputs.releases_created == 'true' }}

      - name: Build and push server-only
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-slim
          cache-to: type=gha,mode=max,scope=queryflux-slim

  build-full:
    name: Build server + Studio image
    needs: [release_please]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest-main
            type=raw,value=${{ needs.release_please.outputs.tag_name }}-full,enable=${{ needs.release_please.outputs.releases_created == 'true' }}
            type=raw,value=latest,enable=${{ needs.release_please.outputs.releases_created == 'true' }}

      - name: Build and push server + Studio
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux-unified/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-full
          cache-to: type=gha,mode=max,scope=queryflux-full

  publish:
    name: GitHub Release summary
    needs: [release_please, build-slim, build-full]
    if: ${{ needs.release_please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Job summary
        run: |
          echo "## Release ${{ needs.release_please.outputs.tag_name }} (multi-arch, GHCR)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server only | \`:${{ needs.release_please.outputs.tag_name }}\`, \`:latest-slim\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server + Studio | \`:${{ needs.release_please.outputs.tag_name }}-full\`, \`:latest\` |" >> "$GITHUB_STEP_SUMMARY"
