# Production: semver tag vX.Y.Z (no -rc) → GHCR + GitHub Release.
#
# Native per-arch builds + manifest merge (see lakekeeper/lakekeeper release.yml):
#   - amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm64 — avoids QEMU for Rust/Next compiles.
# Per-arch tags (-amd64 / -arm64), then imagetools create for :tag, :latest-slim, :latest.

name: Release — QueryFlux production (GHCR + GitHub)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || github.repository }}

jobs:
  build-slim:
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm64
            platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-only (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-slim-${{ matrix.suffix }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-slim-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=queryflux-slim-${{ matrix.suffix }}

  build-full:
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm64
            platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server + Studio (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux-unified/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-full-${{ matrix.suffix }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-full-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=queryflux-full-${{ matrix.suffix }}

  manifest-slim:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: [build-slim]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests (server-only)
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          REF="${{ github.ref_name }}"
          docker buildx imagetools create --push \
            -t "$IMG:$REF" \
            "$IMG:$REF-amd64" \
            "$IMG:$REF-arm64"
          docker buildx imagetools create --push \
            -t "$IMG:latest-slim" \
            "$IMG:latest-slim-amd64" \
            "$IMG:latest-slim-arm64"

  manifest-full:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: [build-full]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests (server + Studio)
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          REF="${{ github.ref_name }}"
          docker buildx imagetools create --push \
            -t "$IMG:$REF-full" \
            "$IMG:$REF-full-amd64" \
            "$IMG:$REF-full-arm64"
          docker buildx imagetools create --push \
            -t "$IMG:latest" \
            "$IMG:latest-amd64" \
            "$IMG:latest-arm64"

  publish:
    if: ${{ !contains(github.ref_name, '-rc') }}
    needs: [manifest-slim, manifest-full]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Job summary
        run: |
          echo "## Production images (multi-arch manifest, GHCR)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Native **amd64** / **arm64** builds, then \`docker buildx imagetools create\` (same idea as [lakekeeper release](https://github.com/lakekeeper/lakekeeper/blob/main/.github/workflows/release.yml))." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Manifest tags | Per-arch (pin) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----------------|----------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server only | \`:${{ github.ref_name }}\`, \`:latest-slim\` | \`:${{ github.ref_name }}-amd64\`, \`:latest-slim-amd64\`, … |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server + Studio | \`:${{ github.ref_name }}-full\`, \`:latest\` | \`:${{ github.ref_name }}-full-amd64\`, \`:latest-amd64\`, … |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          make_latest: true
