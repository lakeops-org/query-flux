# Release candidate: push tag vX.Y.Z-rc.N → two multi-arch images to GHCR + GitHub Pre-release.
#
# Images (same package, different tags):
#   - Server only:  :<git-tag>           (docker/queryflux/Dockerfile)
#   - Server + UI:  :<git-tag>-full      (docker/queryflux-unified/Dockerfile)
#
# Registry: ghcr.io/<owner>/<repo> (default github.repository). Optional repo variable
# GHCR_IMAGE_NAME overrides the owner/name part (must be lowercase).

name: Release — QueryFlux RC (GHCR + GitHub)

on:
  push:
    tags:
      - 'v*-rc*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || github.repository }}
  IMAGE_PLATFORMS: linux/amd64,linux/arm64,linux/arm/v7,linux/386

jobs:
  rc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-only (multi-arch)
        id: push-slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          build-args: |
            CARGO_BUILD_JOBS=4

      - name: Build and push server + Studio (multi-arch)
        id: push-full
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux-unified/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-full
          build-args: |
            CARGO_BUILD_JOBS=4

      - name: Job summary
        run: |
          echo "## RC images (multi-arch, GHCR)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server only | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server + Studio | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-full\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Platforms: \`${{ env.IMAGE_PLATFORMS }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest (slim): \`${{ steps.push-slim.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest (full): \`${{ steps.push-full.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          make_latest: false
