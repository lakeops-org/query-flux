# Release candidate: push tag vX.Y.Z-rc.N → GHCR + GitHub Pre-release.
#
# Pattern inspired by lakekeeper/lakekeeper: each arch builds on a NATIVE runner (no QEMU for Rust):
#   - linux/amd64  → ubuntu-latest
#   - linux/arm64  → ubuntu-24.04-arm64
# Per-arch tags (-amd64 / -arm64), then docker buildx imagetools create for the multi-arch manifest.

name: Release — QueryFlux RC (GHCR + GitHub)

on:
  push:
    tags:
      - 'v*-rc*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || github.repository }}

jobs:
  build-slim:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm64
            platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server-only (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.suffix }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-slim-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=queryflux-slim-${{ matrix.suffix }}

  build-full:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm64
            platform: linux/arm64
            suffix: arm64
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server + Studio (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/queryflux-unified/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-full-${{ matrix.suffix }}
          build-args: |
            CARGO_BUILD_JOBS=4
          cache-from: type=gha,scope=queryflux-full-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=queryflux-full-${{ matrix.suffix }}

  manifest-slim:
    needs: [build-slim]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (server-only)
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          REF="${{ github.ref_name }}"
          docker buildx imagetools create --push \
            -t "$IMG:$REF" \
            "$IMG:$REF-amd64" \
            "$IMG:$REF-arm64"

  manifest-full:
    needs: [build-full]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (server + Studio)
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          REF="${{ github.ref_name }}"
          docker buildx imagetools create --push \
            -t "$IMG:$REF-full" \
            "$IMG:$REF-full-amd64" \
            "$IMG:$REF-full-arm64"

  publish:
    needs: [manifest-slim, manifest-full]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Job summary
        run: |
          echo "## RC images (multi-arch manifest, GHCR)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Native **amd64** / **arm64** builds (Lakekeeper-style), then \`imagetools create\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Variant | Manifest tag | Per-arch tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server only | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}\` | \`:${{ github.ref_name }}-amd64\`, \`:${{ github.ref_name }}-arm64\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server + Studio | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-full\` | \`:${{ github.ref_name }}-full-amd64\`, \`:${{ github.ref_name }}-full-arm64\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          make_latest: false
