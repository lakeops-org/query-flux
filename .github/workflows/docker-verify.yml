# Verify both release Dockerfiles on PRs (host platform only, no push).
#   - docker/queryflux/Dockerfile — server only
#   - docker/queryflux-unified/Dockerfile — server + Studio

name: Docker — QueryFlux (verify)

on:
  pull_request:
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'

jobs:
  docker-verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server-only
            file: docker/queryflux/Dockerfile
            tag: queryflux:pr-verify-slim
          - name: server-and-studio
            file: docker/queryflux-unified/Dockerfile
            tag: queryflux:pr-verify-full
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: ${{ matrix.tag }}
          build-args: |
            CARGO_BUILD_JOBS=4
