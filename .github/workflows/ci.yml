name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Faster links on Linux (mold is installed below).
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Smarter than a raw actions/cache on target/: keys per crate graph, fewer misses, smaller uploads.
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # No separate `cargo build`: clippy already compiled the workspace; tests reuse incremental artifacts.
      - name: Test
        run: cargo test --workspace
