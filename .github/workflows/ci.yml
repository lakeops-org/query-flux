name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'

env:
  RUST_TOOLCHAIN_VERSION: "1.91.1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # DuckDB Rust crate: download prebuilt libduckdb in CI (no system libduckdb).
  DUCKDB_DOWNLOAD_LIB: "1"
  # Faster links on Linux (mold is installed where we compile).
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  # Fast, no PyO3 / no compile — runs in parallel with clippy + unit tests.
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5
      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: queryflux
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv (sqlglot / PyO3)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

      # Exclude queryflux-bench: duplicate link of main stack; benchmark.yml builds it.
      - run: cargo clippy --workspace --all-targets --all-features --exclude queryflux-bench -- -D warnings

  unit-test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Install mold linker
        uses: rui314/setup-mold@v1

      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: queryflux
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv (sqlglot / PyO3)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

      - run: cargo test --tests --workspace --exclude queryflux-e2e-tests --exclude queryflux-bench

  e2e:
     name: E2E tests (Docker)
     needs: [fmt, clippy]
     runs-on: ubuntu-latest
     timeout-minutes: 90
     steps:
       - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

       # StarRocks all-in-one + Trino + Lakekeeper stack needs many GB of layer space;
       # default ubuntu-latest root FS often fills during `docker compose pull`.
       - name: Free disk space
         uses: jlumbroso/free-disk-space@v1.3.1
         with:
           tool-cache: false
           android: true
           dotnet: true
           haskell: true
           large-packages: true
           swap-storage: true

       - name: Install mold linker
         uses: rui314/setup-mold@v1

       - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
         with:
           toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

       - uses: Swatinem/rust-cache@v2
         with:
           shared-key: queryflux
           cache-on-failure: true

       - uses: actions/setup-python@v5
         with:
           python-version: "3.12"

       - name: Python venv (sqlglot / PyO3)
         run: |
           python3 -m venv .venv
           .venv/bin/pip install -r requirements.txt
           echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
           echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

       # E2E compiles deps + integration tests via `cargo test` below. The `queryflux` binary is
       # already covered by the clippy job (`--all-targets`).

       - name: Start e2e Docker stack
         run: docker compose -f docker/docker-compose.test.yml --project-directory . up -d --wait trino starrocks sentinel

       - name: Engine logs (debug on failure)
         if: failure()
         run: |
           docker compose -f docker/docker-compose.test.yml --project-directory . logs --no-color --tail=200 trino || true
           docker compose -f docker/docker-compose.test.yml --project-directory . logs --no-color --tail=200 starrocks || true

       - name: E2E tests
         run: |
           TRINO_URL=http://localhost:18081 \
           STARROCKS_URL=mysql://root@localhost:9030 \
           LAKEKEEPER_URL=http://localhost:18181 \
           MINIO_ENDPOINT=localhost:19000 \
           DUCKDB_DOWNLOAD_LIB=1 \
           cargo test -p queryflux-e2e-tests -- --test-threads=1 --include-ignored

       - name: Stop e2e Docker stack
         if: always()
         run: docker compose -f docker/docker-compose.test.yml --project-directory . down
